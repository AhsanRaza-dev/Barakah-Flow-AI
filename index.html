<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barakah Flow AI - Enterprise Tester</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f9fc;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 2rem;
        }
        .chat-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 2rem;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }
        .message {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
        }
        .user-msg {
            background-color: #e3f2fd;
            border-left: 4px solid #2196f3;
        }
        .ai-msg {
            background-color: #f5f5f5;
            border-left: 4px solid #4caf50;
        }
        
        /* 🟢 Markdown Styling */
        .ai-msg h3 { margin-top: 0; color: #2e7d32; }
        .ai-msg p { margin-top: 5px; margin-bottom: 10px; }
        .ai-msg ul, .ai-msg ol { padding-left: 20px; margin-bottom: 10px; }
        .ai-msg code { background: #e0e0e0; padding: 2px 5px; border-radius: 4px; color: #d32f2f; font-family: monospace; }
        .ai-msg pre { background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 8px; overflow-x: auto; font-family: monospace; }
        .ai-msg pre code { background: transparent; color: inherit; padding: 0; }

        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #2196f3;
        }
        button {
            padding: 12px 24px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        select {
            padding: 10px; 
            border-radius: 8px; 
            border: 2px solid #e0e0e0; 
            font-size: 14px;
            background-color: white;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #2196f3;
        }
        .cache-badge {
            background-color: #ffeb3b;
            color: #d84315;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 8px;
            border: 1px solid #fbc02d;
        }
    </style>
</head>
<body>

    <h1>🕌 Barakah AI Enterprise Tester</h1>
    
    <div style="text-align: center; margin-bottom: 2rem; display: flex; justify-content: center; gap: 15px; align-items: center; flex-wrap: wrap;">
        
        <div>
            <label for="tokenInput" style="font-weight: bold; color: #555;">Auth Token: </label>
            <input type="text" id="tokenInput" value="barakah_flutter_secret_2026" placeholder="Bearer Token..." style="width: 220px; padding: 10px; border-radius: 8px; border: 2px solid #e0e0e0; font-size: 14px;">
        </div>

        <div>
            <label for="madhabSelect" style="font-weight: bold; color: #555;">Fiqh / Madhab: </label>
            <select id="madhabSelect">
                <option value="Hanafi" selected>Hanafi (حنفي)</option>
                <option value="Shafi">Shafi'i (شافعي)</option>
                <option value="Maliki">Maliki (مالكي)</option>
                <option value="Hanbali">Hanbali (حنبلي)</option>
                <option value="Ahle Hadith">Ahle Hadith (أهل الحديث)</option>
                <option value="Any">Any (General RAG)</option>
            </select>
        </div>

    </div>

    <div class="chat-container">
        <div class="messages" id="messages">
            </div>

        <div class="input-group">
            <input type="text" id="queryInput" placeholder="Ask your Islamic question..." onkeypress="handleEnter(event)">
            <button id="sendBtn" onclick="askQuestion()">Ask</button>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/ask";
        
        // 🟢 ENTERPRISE FEATURE: Generate a Session ID for this browser tab
        const currentSessionId = "browser_test_" + Math.floor(Math.random() * 1000000);
        console.log("Current Session ID:", currentSessionId);

        function handleEnter(e) {
            if(e.key === 'Enter') askQuestion();
        }

        async function askQuestion() {
            const input = document.getElementById('queryInput');
            const tokenInput = document.getElementById('tokenInput');
            const madhabSelect = document.getElementById('madhabSelect'); 
            
            const query = input.value.trim();
            const TOKEN = tokenInput.value.trim() || "barakah_flutter_secret_2026";
            const selectedMadhab = madhabSelect.value; 

            const btn = document.getElementById('sendBtn');
            const messages = document.getElementById('messages');

            if (!query) return;

            // 1. Add User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerHTML = `<strong>You:</strong><br>${query}`;
            messages.appendChild(userDiv);
            
            // 2. Prepare AI loading state
            input.value = '';
            btn.disabled = true;
            btn.innerText = 'Thinking...';
            
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.innerHTML = `<strong>Barakah AI:</strong><br><em>Searching ${selectedMadhab !== 'Any' ? selectedMadhab : 'all'} evidences...</em>`;
            messages.appendChild(aiDiv);
            messages.scrollTo(0, messages.scrollHeight);

            try {
                // 3. Make Enterprise JSON API Call
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({ 
                        query: query,
                        language: "roman_urdu",
                        madhab: selectedMadhab,
                        // 🟢 Naye Data Fields
                        session_id: currentSessionId,
                        user_id: "anonymous"
                    })
                });

                // 🟢 ENTERPRISE ERROR HANDLING (Rate limits etc.)
                if (!response.ok) {
                    const errData = await response.json().catch(() => null);
                    const errMsg = errData && errData.detail ? errData.detail : `Server Error: ${response.status}`;
                    throw new Error(errMsg);
                }

                // 4. JSON Response Read
                const data = await response.json();

                if (data.status === "success") {
                    const formattedAnswer = marked.parse(data.answer);
                    
                    // 🟢 CACHE BADGE UI
                    let cacheIndicator = "";
                    if (data.source === "cache") {
                        cacheIndicator = `<div class="cache-badge">⚡ CACHE HIT (0.1s) - $0 Cost</div><br>`;
                    }

                    let madhabBadge = "";
                    if (data.madhab_applied && data.madhab_applied !== "Any") {
                         madhabBadge = `<div style="margin-top: 15px;"><small style="color: #2196f3; border: 1px solid #2196f3; padding: 4px 8px; border-radius: 4px; background: #e3f2fd;"><strong>🔍 Filter Applied: ${data.madhab_applied} Fiqh</strong></small></div>`;
                    }

                    // Set HTML safely with all new features
                    aiDiv.innerHTML = `<strong>Barakah AI:</strong><br>${cacheIndicator}<div style="margin-top: 10px;">${formattedAnswer}</div>${madhabBadge}`;
                } else {
                    aiDiv.innerHTML = `<strong>Barakah AI:</strong><br><em>Kuch galat ho gaya.</em>`;
                }

            } catch (error) {
                // Show errors gracefully (like 403 Rate Limit)
                aiDiv.innerHTML = `<strong>System Alert:</strong><br><span style="color: #d32f2f; font-weight: bold;">${error.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Ask';
                messages.scrollTo(0, messages.scrollHeight);
            }
        }
    </script>
</body>
</html>
