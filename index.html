<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barakah Flow AI - Tester</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f9fc;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 2rem;
        }
        .chat-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 2rem;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }
        .message {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
        }
        .user-msg {
            background-color: #e3f2fd;
            border-left: 4px solid #2196f3;
        }
        .ai-msg {
            background-color: #f5f5f5;
            border-left: 4px solid #4caf50;
            white-space: pre-wrap; /* Preserves the markdown spacing nicely */
        }
        .citation-box {
            margin-top: 1rem;
            background: #fff;
            border: 1px solid #ddd;
            padding: 0.8rem;
            font-size: 0.9em;
            border-radius: 6px;
        }
        .citation-title {
            font-weight: bold;
            color: #666;
            margin-bottom: 0.5rem;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #2196f3;
        }
        button {
            padding: 12px 24px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>🕌 Barakah AI Tester</h1>
    <div style="text-align: center; margin-bottom: 2rem;">
        <label for="tokenInput" style="font-weight: bold; color: #555;">Auth Token: </label>
        <input type="text" id="tokenInput" value="barakah-secure-token-123" placeholder="Enter Bearer Token..." style="width: 250px; padding: 10px; border-radius: 8px; border: 2px solid #e0e0e0; font-size: 14px; margin-left: 10px;">
    </div>

    <div class="chat-container">
        <div class="messages" id="messages">
            <!-- Messages will appear here -->
        </div>

        <div class="input-group">
            <input type="text" id="queryInput" placeholder="Ask your Islamic question..." onkeypress="handleEnter(event)">
            <button id="sendBtn" onclick="askQuestion()">Ask</button>
        </div>
    </div>

    <script>
        const API_URL = "/api/ask";

        function handleEnter(e) {
            if(e.key === 'Enter') askQuestion();
        }

        async function askQuestion() {
            const input = document.getElementById('queryInput');
            const tokenInput = document.getElementById('tokenInput');
            const query = input.value.trim();
            const TOKEN = tokenInput.value.trim() || "barakah-secure-token-123";
            const btn = document.getElementById('sendBtn');
            const messages = document.getElementById('messages');

            if (!query) return;

            // 1. Add User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerHTML = `<strong>You:</strong><br>${query}`;
            messages.appendChild(userDiv);
            
            // 2. Prepare AI loading state
            input.value = '';
            btn.disabled = true;
            btn.innerText = 'Thinking...';
            
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-msg';
            aiDiv.innerHTML = `<strong>Barakah AI:</strong><br><em>Consulting evidences...</em>`;
            messages.appendChild(aiDiv);
            messages.scrollTo(0, messages.scrollHeight);

            try {
                // 3. Make Streaming API Call to FastAPI
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify({ query: query })
                });

                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}: ${await response.text()}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let answerText = "";
                let citationsHtml = "";
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, {stream: true});
                    let parts = buffer.split('\n\n');
                    buffer = parts.pop(); // keep incomplete chunk
                    
                    for (const part of parts) {
                        if (part.startsWith('data: ')) {
                            const dataStr = part.substring(6);
                            if (dataStr === '[DONE]') break;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.status) {
                                    aiDiv.innerHTML = `<strong>Barakah AI:</strong><br><em>${data.status}</em>`;
                                } else if (data.chunk) {
                                    answerText += data.chunk;
                                    // Make sure double new lines become paragraphs or breaks
                                    aiDiv.innerHTML = `<strong>Barakah AI:</strong><br>${answerText.replace(/\n/g, '<br>')}`;
                                } else if (data.citations && data.citations.length > 0) {
                                    citationsHtml += `<div class="citation-box"><div class="citation-title">📚 Sources Considered:</div><ul>`;
                                    data.citations.forEach(cit => {
                                        citationsHtml += `<li><strong>[${cit.source_type.toUpperCase()}]</strong> ${cit.display_text}</li>`;
                                    });
                                    citationsHtml += `</ul></div>`;
                                    aiDiv.innerHTML = `<strong>Barakah AI:</strong><br>${answerText.replace(/\n/g, '<br>')}${citationsHtml}`;
                                } else if (data.error) {
                                    throw new Error(data.error);
                                }
                            } catch (e) {
                                // Just a parse catch for weird chunks
                            }
                        }
                    }
                    messages.scrollTo(0, messages.scrollHeight);
                }

            } catch (error) {
                aiDiv.innerHTML = `<strong>Error:</strong><br><span style="color: red;">${error.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Ask';
                messages.scrollTo(0, messages.scrollHeight);
            }
        }
    </script>
</body>
</html>
